name: 🌾 Agro Weekly Auto-Update

on:
  # 매주 일요일 23:00 UTC = 월요일 08:00 KST
  schedule:
    - cron: '0 23 * * 0'

  # 수동 실행 (테스트용 - GitHub Actions 탭에서 직접 실행 가능)
  workflow_dispatch:
    inputs:
      target_date:
        description: '업데이트 기준 날짜 (YYYY-MM-DD, 비우면 자동 계산)'
        required: false
        default: ''
      dry_run:
        description: '테스트 실행 (커밋 없이 결과만 확인)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  update-news:
    name: Claude AI 뉴스 수집 및 업데이트
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # GitHub Pages 배포를 위한 권한
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      # 1. 레포지토리 체크아웃
      - name: 📥 레포지토리 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Python 설정
      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      # 3. 의존성 설치
      - name: 📦 패키지 설치
        run: |
          pip install -r requirements.txt

      # 4. Claude AI 뉴스 업데이트 스크립트 실행
      - name: 🤖 Claude AI 뉴스 검색 및 HTML 업데이트
        env:
          GEMINI_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python update_news.py

      # 5. 변경사항 확인
      - name: 🔍 변경사항 확인
        id: check_changes
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ 이번 주 데이터가 이미 존재하거나 업데이트할 내용이 없습니다."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 새로운 뉴스 데이터가 추가되었습니다."
            git diff --stat index.html
          fi

      # 6. 커밋 & 푸시 (변경사항 있을 때만)
      - name: 💾 변경사항 커밋 및 푸시
        if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "Agro Weekly Bot"
          git config user.email "agro-bot@farmhannong.com"
          
          # 업데이트 날짜를 KST로 계산
          UPDATE_DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
          
          git add index.html
          git commit -m "🌾 Weekly Agro News Update - ${UPDATE_DATE}

          - Claude AI가 자동으로 수집한 주간 농업화학 뉴스
          - GitHub Actions 자동 실행 (매주 월요일 08:00 KST)"
          
          git push origin main

      # 7. 실행 결과 요약
      - name: 📊 실행 결과 요약
        if: always()
        run: |
          echo "## 🌾 Agro Weekly 업데이트 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f update_result.txt ]; then
            cat update_result.txt >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**실행 시간:** $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')" >> $GITHUB_STEP_SUMMARY
